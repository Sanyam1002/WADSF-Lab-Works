<!DOCTYPE html>
<html>
<body>

<h3>Remove List Item</h3>
<ul id="myList">
    <li>Apple</li>
    <li>Banana</li>
    <li>Orange</li>
</ul>

<button onclick="removeItem()">Remove Last Item</button>

<script>
function removeItem() {
    let list = document.getElementById("myList");
    if (list.children.length > 0) {
        list.removeChild(list.lastElementChild);
    }
}
</script>

</body>
</html>

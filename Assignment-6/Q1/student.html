<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    margin: 0;
    padding: 0;
}

.container {
    width: 85%;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    position: relative;
}

.logo {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 80px;
}

h1 {
    text-align: center;
    color: #333;
}

fieldset {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 8px;
}

legend {
    font-weight: bold;
    color: #444;
}

label {
    display: block;
    margin-top: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.inline {
    display: inline-block;
    width: 32%;
}

.radio-group {
    margin-top: 5px;
}

.radio-group input {
    width: auto;
}

button {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    width: 100%;
    font-size: 16px;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
table th, table td {
    padding: 8px;
    text-align: left;
    word-wrap: break-word;
}

button:hover {
    background: #45a049;
}

button.reset { background:#e74c3c; }

.watermark {
    position: absolute;
    opacity: 0.1;
    font-size: 60px;
    top: 40%;
    left: 20%;
    transform: rotate(-30deg);
}


.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>
<div class="container">

<img src="logo.png" class="logo" alt="Logo">
<div class="watermark">AS University</div>

<h1>STUDENT REGISTRATION FORM</h1>

<form>

<fieldset>
<legend>Student Information</legend>

<label>Full Name</label>
<input type="text" placeholder="First Name" required>
<input type="text" placeholder="Middle Name">
<input type="text" placeholder="Last Name" required>

<label>Phone</label>
<input type="tel" required>

<label>Email</label>
<input type="email" required>

<label>Gender</label>
<div class="radio-group">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
</div>

<label>Blood Group</label>
<select>
<option>A+</option><option>A-</option><option>B+</option><option>B-</option>
<option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
</select>

<label>Date of Birth</label>
<input type="date">

<label>Nationality</label>
<input type="text">

<label>Hobbies</label>
<input type="text">

<label>Aadhar Number</label>
<input type="text">

<label>Health Issues</label>
<textarea></textarea>

<label>Category</label>
<select>
<option>General</option><option>SC</option><option>ST</option><option>OBC</option>
</select>

</fieldset>

<fieldset>
<legend>Address</legend>
<label>Street</label>
<input type="text">
<label>Landmark / Nearest Police/Post Station</label>
<input type="text">
<label>City/District</label>
<input type="text">


<label>Country</label>
<select>
<option>India</option><option>USA</option><option>UK</option>
</select>

<label>State</label>
<select>
<option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
<option>Bihar</option><option>Chhattisgarh</option><option>Goa</option>
<option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option>
<option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
<option>Madhya Pradesh</option><option>Maharashtra</option><option>Manipur</option>
<option>Meghalaya</option><option>Mizoram</option><option>Nagaland</option>
<option>Odisha</option><option>Punjab</option><option>Rajasthan</option>
<option>Sikkim</option><option>Tamil Nadu</option><option>Telangana</option>
<option>Tripura</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
<option>West Bengal</option>
</select>


<label>Pin Code</label>
<input type="text">
</fieldset>

<fieldset>
<legend>Parent Details</legend>
<label>Father Name</label><input type="text">
<label>Father Profession</label><input type="text">
<label>Father Phone</label><input type="tel">
<label>Father Email</label><input type="email">

<label>Mother Name</label><input type="text">
<label>Mother Profession</label><input type="text">
<label>Mother Phone</label><input type="tel">
<label>Mother Email</label><input type="email">

<label>Local Guardian Name</label><input type="text">
<label>Guardian Phone</label><input type="tel">
<label>Guardian Email</label><input type="email">
</fieldset>

<fieldset>
<legend>Academic Details</legend>
<label>Previous Qualification</label>
<table border="1" width="100%">
<tr><th>Exam</th><th>Board</th><th>Year</th><th>Percentage</th><th>School/Institute/University</th></tr>
<tr><td>10th</td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
<tr><td>12th</td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
<tr><td>Other</td><td><input></td><td><input></td><td><input></td><td><input></td></tr>
</table>
<input type="text">
</fieldset>


<fieldset>
<legend>Enrollment Details</legend>
<label>Program Name</label>
<select>
<option>B.Tech</option><option>BE</option><option>B.Sc Agriculture</option>
<option>B.Pharma</option><option>D.Pharma</option><option>MBBS</option>
<option>BDS</option><option>BMLT</option><option>BMRT</option>
<option>BCA</option><option>MBA</option><option>M.Tech</option>
<option>M.Sc</option><option>Diploma Engineering</option>
<option>BA</option><option>B.Com</option><option>M.Com</option>
<option>PhD</option><option>LLB</option><option>LLM</option>
<option>B.Ed</option><option>M.Ed</option><option>BBA</option>
<option>Hotel Management</option><option>Animation</option>
<option>Fashion Design</option><option>Fine Arts</option>
<option>Journalism</option><option>Architecture</option>
<option>Interior Design</option>
</select>

<label>Course Name (Domain/Subdomain)</label>
<select>
<option>Computer Science - AI</option>
<option>Computer Science - Data Science</option>
<option>Computer Science - CyberSecurity</option>
<option>Agri-Informatics or Agricultural Informatics</option>
<option>Mechanical Engineering</option>
<option>Civil Engineering</option>
<option>Electronics Engineering</option>
</select>

<label>Qualification Level</label>
<select>
<option>UG</option><option>PG</option><option>Diploma</option>
</select>

<label>Year of Study</label>
<select>
<option>1st Year</option><option>2nd Year</option>
<option>3rd Year</option><option>4th Year</option><option>5th Year</option>
</select>

</fieldset>

<fieldset>
<legend>Uploads</legend>
<label>Upload Photo</label>
<input type="file">

<label>Upload Signature</label>
<input type="file">

<label>Comments</label>
<textarea></textarea>
</fieldset>

<button type="submit">Submit</button>
<button type="reset" class="reset">Reset</button>

</form>

<div class="footer">
<p>© 2026 AS University | Dean: H SANYAM KUMAR</p>
<p>Created by H SANYAM KUMAR</p>
</div>

</div>
</body>
</html>
